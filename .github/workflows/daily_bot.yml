name: KARASH Daily Bot

on:
  schedule:
    # Her hafta içi 07:00 UTC (Türkiye 10:00, Almanya 08/09:00)
    - cron: "0 7 * * 1-5"
  workflow_dispatch:  # manuel tetikleme için

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run KARASH bot
        run: python bot.py

      - name: Commit & push slots.json
        run: |
          git config user.name  "KARASH-Bot"
          git config user.email "bot@karash.local"
          git add data/slots.json
          git diff --cached --quiet || git commit -m "🤖 KARASH bot — $(date +'%Y-%m-%d')"
          git push
